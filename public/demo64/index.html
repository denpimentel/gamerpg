<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ilha de Elmsong — 64×64 · biomas, monstros e paper doll</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
/* --- fontes pixel --- */
@font-face { font-family: 'Pixelify Sans'; src: url('../vendor/fonts/PixelifySans.woff2') format('woff2'); font-weight: 400 700; font-display: block; }
@font-face { font-family: 'Press Start 2P'; src: url('../vendor/fonts/PressStart2P.woff2') format('woff2'); font-display: block; }

/* ============ HUD React (3 temas via data-theme) ============ */
#hudReact { position: fixed; top: 64px; left: 12px; z-index: 15; image-rendering: pixelated; }
#hudReact img { image-rendering: pixelated; }
#hudReact .av img { width: 100%; height: 100%; object-fit: cover; }
#hudReact .row { display: flex; align-items: center; }

/* --- Tema 1: PERGAMINHO (madeira/pergaminho, barra contínua, sem avatar) --- */
#hudReact[data-theme="pergaminho"] .card {
  width: 232px; padding: 9px 12px;
  background:
    repeating-linear-gradient(0deg, rgba(120,80,30,.05) 0 3px, transparent 3px 6px),
    linear-gradient(145deg, #efe0bb, #d8c48c);
  border: 4px solid #7a4a1e; outline: 3px solid #2c1608;
  box-shadow: inset 0 0 0 2px #c79a52, inset 0 0 18px rgba(120,70,20,.35);
  color: #4a2c10; font-family: 'VT323', monospace;
}
#hudReact[data-theme="pergaminho"] canvas { image-rendering: pixelated; display: block; }
#hudReact[data-theme="pergaminho"] .hpTrack {
  height: 16px; margin: 3px 0 7px; position: relative;
  background: #6a4a22; border: 2px solid #3a2208; box-shadow: inset 1px 1px 0 #2c1808;
  display: flex; align-items: center; justify-content: center;
}
#hudReact[data-theme="pergaminho"] .hpFill {
  position: absolute; left: 0; top: 0; height: 100%; background: #c0392b; transition: width .2s;
}
#hudReact[data-theme="pergaminho"] .hpNum { position: relative; z-index: 1; }
#hudReact[data-theme="pergaminho"] .stats { display: flex; gap: 18px; }
#hudReact[data-theme="pergaminho"] .stat { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
#hudReact[data-theme="pergaminho"] .stat img { width: 18px; height: 18px; }

/* --- Tema TINY: pack UI oficial Tiny Swords (barras base+fill 3-slice + retrato) --- */
#hudReact[data-theme="tiny"] .card { position: relative; width: 366px; height: 138px; }
#hudReact[data-theme="tiny"] .port {
  position: absolute; left: 2px; top: 28px; width: 104px; height: 104px;
  background: url('../assets/64/ui/tiny/portrait_frame.png') no-repeat; background-size: 104px 104px;
}
#hudReact[data-theme="tiny"] .port .hero {
  position: absolute; left: 15px; top: 15px; width: 74px; height: 74px; image-rendering: pixelated;
}
#hudReact[data-theme="tiny"] .lvlBadge {
  position: absolute; left: 0px; top: 100px; min-width: 30px; height: 26px; padding: 0 4px;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(circle at 40% 35%, #f4d47a, #b8862f);
  border: 2px solid #2a1a06; border-radius: 6px;
}
#hudReact[data-theme="tiny"] .nm { position: absolute; left: 104px; top: 4px; }
#hudReact[data-theme="tiny"] .bar {
  position: absolute; left: 100px; width: 260px; height: 64px;
  background: url('../assets/64/ui/tiny/bar_frame.png') no-repeat; background-size: 260px 64px;
}
#hudReact[data-theme="tiny"] .bar.hp { top: 48px; }
#hudReact[data-theme="tiny"] .barInner {
  position: absolute; left: 15px; top: 21px; width: 230px; height: 22px; overflow: hidden;
}
#hudReact[data-theme="tiny"] .fill {
  height: 100%; background-repeat: no-repeat; background-size: 230px 22px;
  image-rendering: pixelated; transition: width .25s;
}
#hudReact[data-theme="tiny"] .fill.hp { background-image: url('../assets/64/ui/tiny/fill_hp.png'); }
#hudReact[data-theme="tiny"] .barTxt {
  position: absolute; left: 15px; width: 230px; top: 20px; height: 24px;
  display: flex; align-items: center; justify-content: center; z-index: 2;
}

#invToggle {
  position: fixed; top: 54px; right: 12px; z-index: 20;
  background: rgba(20,24,32,.85); color: #ffd76a;
  border: 1px solid rgba(255,255,255,.25); border-radius: 20px;
  padding: 8px 14px; font-size: 14px; cursor: pointer;
}
/* --- Inventário estilo Tiny Swords (madeira) --- */
#inv {
  position: fixed; top: 100px; right: 12px; z-index: 20; width: 300px; display: none;
  padding: 6px 12px 14px; box-sizing: border-box;
  max-height: calc(100vh - 120px); overflow-y: auto;
  image-rendering: pixelated;
  border: 30px solid transparent;
  border-image: url('../assets/64/ui/tsui/panel.png') 30 fill / 30px stretch;
}
#inv.open { display: block; }
#inv h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em;
  color: #5a3410; text-shadow: 0 1px 0 rgba(255,240,200,.4); margin: 8px 0 7px; }
#inv h3:first-child { margin-top: 0; }
.slots { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.slot {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  background: url('../assets/64/ui/tsui/slot.png') no-repeat center / 100% 100%;
  image-rendering: pixelated; cursor: pointer;
}
.slot:hover { filter: brightness(1.12); }
.slot.sel { filter: drop-shadow(0 0 3px #ffd76a) brightness(1.15); }
.slot img { width: 62%; height: 62%; object-fit: contain; image-rendering: pixelated; }
.slot span { display: none; }
@media (max-width: 640px) { #inv { width: 262px; } }

/* ============ A.I.U.I.Codex — segunda UI, paralela ao HUD atual ============ */
#codexHud {
  --codex-gold: #e5b553;
  --codex-cream: #f1e6ce;
  --codex-muted: #b9a9bd;
  position: fixed; top: 208px; left: 50%; z-index: 16;
  width: 351px; transform: translateX(-50%);
  image-rendering: pixelated; pointer-events: none;
  font-family: 'Pixelify Sans', sans-serif;
  filter: drop-shadow(0 3px 4px rgba(0,0,0,.7));
}
#codexHud img { image-rendering: pixelated; }
.codex-main { display: flex; align-items: center; gap: 10px; height: 68px; }
.codex-portrait {
  position: relative; width: 67px; height: 68px; flex: 0 0 auto;
  border: 0; padding: 0; background: transparent; cursor: pointer; pointer-events: auto;
}
.codex-portrait .hero {
  position: absolute; left: 9px; top: 9px; width: 49px; height: 49px;
  object-fit: cover; z-index: 2;
}
.codex-portrait .frame { position: absolute; inset: 0; width: 67px; height: 68px; z-index: 1; }
.codex-vitals { width: 274px; min-width: 0; }
.codex-name {
  height: 25px; padding-left: 7px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  color: var(--codex-gold); font-size: 20px; font-weight: 700;
  text-shadow: 0 2px 0 #26140b, 2px 0 0 #26140b, -2px 0 0 #26140b;
}
.codex-hp { position: relative; width: 274px; height: 34px; }
.codex-hp .track { position: absolute; left: 7px; top: 7px; width: 260px; height: 20px; }
.codex-hp .fill-clip {
  position: absolute; left: 7px; top: 7px; width: 0; height: 20px;
  overflow: hidden; z-index: 1; transition: width .2s ease-out;
}
.codex-hp .fill-clip img { width: 260px; height: 20px; max-width: none; }
.codex-hp .frame { position: absolute; inset: 0; width: 274px; height: 34px; z-index: 2; pointer-events: none; }
.codex-hp .value {
  position: absolute; inset: 6px 7px 8px; z-index: 3;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums;
  text-shadow: 1px 1px 0 #3b0505, -1px 1px 0 #3b0505;
}
.codex-actions { display: flex; justify-content: center; gap: 20px; margin-top: 7px; pointer-events: auto; }
.codex-action {
  position: relative; width: 88px; min-height: 68px; padding: 0 0 15px;
  border: 0; background: transparent; color: var(--codex-cream); cursor: pointer;
  font: 700 13px/1 'Pixelify Sans', sans-serif;
}
.codex-action .button-frame { width: 48px; height: 51px; margin: 0 auto; }
.codex-action .glyph {
  position: absolute; left: 20px; top: 10px; width: 48px; height: 31px;
  display: flex; align-items: center; justify-content: center;
  color: var(--codex-gold); font-size: 18px; text-shadow: 1px 1px 0 #1b0c12;
}
.codex-action .label { position: absolute; left: 0; right: 0; bottom: 0; }
.codex-action:focus-visible, .codex-portrait:focus-visible { outline: 2px solid #d25cff; outline-offset: 3px; }
#codexProfile {
  position: absolute; top: 143px; left: 50%; width: 312px; height: 204px;
  transform: translateX(-50%); padding: 28px 30px; pointer-events: auto;
  background: url('../assets/64/ui/codex/panel.png') no-repeat center / 312px 204px;
  color: var(--codex-cream);
}
#codexProfile[hidden] { display: none; }
.codex-profile-head { display: flex; align-items: center; gap: 12px; }
.codex-profile-head .portrait-wrap { position: relative; width: 67px; height: 68px; flex: 0 0 auto; }
.codex-profile-head .portrait-wrap .hero { position: absolute; left: 9px; top: 9px; width: 49px; height: 49px; object-fit: cover; z-index: 2; }
.codex-profile-head .portrait-wrap .frame { position: absolute; inset: 0; width: 67px; height: 68px; }
.codex-profile-title { min-width: 0; }
.codex-profile-title strong { display: block; color: var(--codex-gold); font-size: 21px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.codex-profile-title span { color: var(--codex-muted); font-size: 14px; }
.codex-profile-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px;
  margin-top: 14px; padding-top: 11px; border-top: 1px solid rgba(229,181,83,.25);
}
.codex-profile-stat { text-align: center; }
.codex-profile-stat b { display: block; color: var(--codex-gold); font-size: 17px; font-variant-numeric: tabular-nums; }
.codex-profile-stat small { color: var(--codex-muted); font-size: 10px; text-transform: uppercase; letter-spacing: .07em; }
@media (max-width: 640px) {
  #codexHud { top: 204px; }
}
</style>
</head>

<div class="hud">
  <a href="../">← Hub</a>
  <span class="chip"><b>64×64</b> · 4 biomas · 18 monstros · paper doll · montarias · bioma NEVE por IA</span>

        <div class="fill-clip" id="codexHpClip"><img src="../assets/64/ui/codex/hp-fill.png" alt=""></div>
        <img class="frame" src="../assets/64/ui/codex/hp-frame.png" alt="">

  <div class="codex-actions">

    <button class="codex-action" id="codexProfileToggle" type="button" aria-label="Abrir perfil" aria-pressed="false">

      <span class="glyph" aria-hidden="true">P</span><span class="label">Perfil</span>

  <div id="codexProfile" hidden aria-label="Perfil do personagem">
    <div class="codex-profile-head">
      <div class="portrait-wrap"><img class="hero" id="codexProfilePortrait" alt=""><img class="frame" src="../assets/64/ui/codex/portrait-frame.png" alt=""></div>
      <div class="codex-profile-title"><strong id="codexProfileName"></strong><span id="codexProfileLevel"></span></div>
    </div>
    <div class="codex-profile-stats">
      <div class="codex-profile-stat"><b id="codexProfileGold"></b><small>Ouro</small></div>

      <div class="codex-profile-stat"><b id="codexProfileHp"></b><small>Vida</small></div>
    </div>
  </div>
</div>

<script src="../vendor/react.production.min.js"></script>
<script src="../vendor/react-dom.production.min.js"></script>
<script>
// HUD Pergaminho em React puro. Texto é PIXELADO DE VERDADE:
// renderiza a fonte num canvas pequeno (Press Start 2P 8px), binariza o alpha p/ matar
// o antialias e faz upscale nearest — vira pixel chunky como os sprites do jogo.
(function () {
  const e = React.createElement;
  const PX = '../assets/64/ui/px/';
  const img = (src) => e('img', { src: PX + src, alt: '' });

  // canvas cache: mesma string+cor+tamanho reaproveita
  const cache = {};
  // Texto pixel de ALTA resolução (estilo 128px): renderiza a fonte Pixelify Sans num
  // tamanho grande (rp px) e binariza o alpha p/ matar o antialias — bordas duras, mas
  // degraus finos de 1px. Pixelify Sans é pixel PORÉM legível como o título do mapa.
  function pixelTextCanvas(text, color, rp, block) {
    block = block || 1;
    const key = text + '|' + color + '|' + rp + '|' + block;
    if (cache[key]) return cache[key];
    // sem letterSpacing (no Chrome ele posiciona em subpixel e quebra a binarização)
    const font = '400 ' + rp + 'px "Pixelify Sans"';
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    ctx.font = font;
    const w = Math.max(1, Math.ceil(ctx.measureText(text).width) + 3);
    const h = rp + 6;
    c.width = w; c.height = h;
    ctx.font = font;
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#fff';
    ctx.fillText(text, 1, 2);
    const id = ctx.getImageData(0, 0, w, h);
    const [cr, cg, cb] = [parseInt(color.slice(1, 3), 16), parseInt(color.slice(3, 5), 16), parseInt(color.slice(5, 7), 16)];
    for (let i = 0; i < id.data.length; i += 4) {
      if (id.data[i + 3] > 128) { id.data[i] = cr; id.data[i + 1] = cg; id.data[i + 2] = cb; id.data[i + 3] = 255; }
      else id.data[i + 3] = 0;
    }
    ctx.putImageData(id, 0, 0);
    if (block === 1) { cache[key] = c; return c; }
    const out = document.createElement('canvas');
    out.width = w * block; out.height = h * block;
    const octx = out.getContext('2d');
    octx.imageSmoothingEnabled = false;
    octx.drawImage(c, 0, 0, out.width, out.height);
    cache[key] = out;
    return out;
  }
  // componente que injeta o canvas pixelado
  function PxText({ text, color, rp, block }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      const el = ref.current; if (!el) return;
      const cv = pixelTextCanvas(text, color, rp, block);
      el.innerHTML = '';
      el.appendChild(cv);
    }, [text, color, rp, block]);
    return e('span', { ref, style: { display: 'inline-flex' } });
  }
  const px = (text, color, rp) => e(PxText, { text, color, rp });

  const hpLvl = (f) => (f <= 0.25 ? ' low' : f <= 0.5 ? ' mid' : '');
  function Pergaminho(d) {
    const f = d.hp / d.hpMax;
    return e('div', { className: 'card' },
      px(d.nome, '#5a2f10', 24),
      e('div', { className: 'hpTrack' },
        e('div', { className: 'hpFill' + hpLvl(f), style: { width: (f * 100) + '%' } }),
        e('div', { className: 'hpNum' }, px(d.hp + '/' + d.hpMax, '#ffffff', 16))),
      e('div', { className: 'stats' },
        e('div', { className: 'stat' }, img('coin.png'), px('' + d.gold, '#6b3d0c', 18)),
        e('div', { className: 'stat' }, img('gem.png'), px('IDADE ' + d.idade, '#2c4a6a', 18))));
  }

  // Card Tiny Swords: moldura de barra 3-slice (base+fill do pack) + retrato do herói.
  function Tiny(d) {
    const bar = (cls, val, max) =>
      e('div', { className: 'bar ' + cls },
        e('div', { className: 'barInner' },
          e('div', { className: 'fill ' + cls,
            style: { width: Math.max(0, Math.min(1, val / max)) * 100 + '%' } })),
        e('div', { className: 'barTxt' }, px(val + '/' + max, '#ffffff', 14)));
    return e('div', { className: 'card' },
      e('div', { className: 'port' },
        d.portrait ? e('img', { className: 'hero', src: d.portrait, alt: '' }) : null),
      e('div', { className: 'lvlBadge' }, px('' + d.nivel, '#2a1a06', 15)),
      e('div', { className: 'nm' }, px(d.nome, '#f5d27a', 22)),
      bar('hp', d.hp, d.hpMax));
  }

  function Hud() {
    const [d, setD] = React.useState({ nome: 'Calney', hp: 100, hpMax: 100,
      energia: 80, energiaMax: 100, xp: 3250, xpMax: 6400, nivel: 5, gold: 125, idade: 10, portrait: null });
    React.useEffect(() => {
      const sync = () => { if (window.__hudData) setD(window.__hudData()); };
      window.addEventListener('hudchange', sync);
      sync();
      return () => window.removeEventListener('hudchange', sync);
    }, []);
    const root = document.getElementById('hudReact');
    if (root) root.dataset.theme = 'tiny';
    return Tiny(d);
  }
  // espera a fonte pixel antes de renderizar (senão o canvas mede errado)
  document.fonts.load('700 20px "Pixelify Sans"').then(() => {
    ReactDOM.createRoot(document.getElementById('hudReact')).render(e(Hud));
  });
})();
</script>

<script>
// inventário DOM — conversa com o jogo via window.__equip
const WEAPONS_UI = [
  ['longsword', 'Espada longa'], ['dagger', 'Adaga'], ['mace', 'Maça'],
  ['waraxe', 'Machado'], ['spear', 'Lança'],
];
const ARMORS_UI = [
  ['shirt', 'Camisa'], ['leather', 'Couro'], ['chain', 'Cota de malha'],
  ['legion', 'Legião'], ['plate', 'Placas'],
];
const MOUNTS_UI = [
  ['none', 'A pé', 'dismount'],
  ['marrom', 'Marrom', 'horse_marrom'], ['preto', 'Preto', 'horse_preto'],
  ['cinza', 'Cinza', 'horse_cinza'], ['dourado', 'Dourado', 'horse_dourado'],
  ['branco', 'Branco', 'horse_branco'], ['porco', 'Porco Rosa ✦', 'mount_porco'],
  ['slime', 'Slime ✦', 'mount_slime'],
];
function buildSlots(elId, items, kind) {
  const el = document.getElementById(elId);
  for (const [id, label, icon] of items) {
    const b = document.createElement('div');
    b.className = 'slot';
    b.dataset.id = id;
    b.innerHTML = `<img src="../assets/64/ui/icons/${icon || id}.png" alt=""><span>${label}</span>`;
    b.onclick = () => {
      window.__equip && window.__equip(kind, id);
      el.querySelectorAll('.slot').forEach(s => s.classList.toggle('sel', s === b));
    };
    el.appendChild(b);
  }
}
buildSlots('slotsS', [['skin_lpc', 'Herói LPC'], ['skin_ai', 'Cavaleiro IA ✦']], 'skin');
buildSlots('slotsW', WEAPONS_UI, 'weapon');
buildSlots('slotsA', ARMORS_UI, 'armor');
buildSlots('slotsM', MOUNTS_UI, 'mount');
document.getElementById('invToggle').onclick = () =>
  document.getElementById('inv').classList.toggle('open');
window.__markEquipped = (kind, id) => {
  const el = document.getElementById(
    kind === 'weapon' ? 'slotsW' : kind === 'skin' ? 'slotsS' : kind === 'mount' ? 'slotsM' : 'slotsA');
  el.querySelectorAll('.slot').forEach(s => s.classList.toggle('sel', s.dataset.id === id));
};
addEventListener('keydown', e => {
  if (e.key === 'i' || e.key === 'I') document.getElementById('inv').classList.toggle('open');
});

// A.I.U.I.Codex paralelo — lê a mesma API do HUD atual; não mantém estado de jogo próprio.
(function () {
  const A = '../assets/64/ui/codex/';
  const inv = document.getElementById('inv');
  const inventoryButton = document.getElementById('codexInventoryToggle');
  const profileButton = document.getElementById('codexProfileToggle');
  const portraitButton = document.getElementById('codexPortraitToggle');
  const profile = document.getElementById('codexProfile');

  function buttonState(button, selected) {
    button.setAttribute('aria-pressed', selected ? 'true' : 'false');
    button.querySelector('.button-frame').src = A + (selected ? 'button-selected.png' : 'button-neutral.png');
  }

  function closeProfile() {
    profile.hidden = true;
    profileButton.setAttribute('aria-expanded', 'false');
    portraitButton.setAttribute('aria-expanded', 'false');
    buttonState(profileButton, false);
  }

  function toggleProfile() {
    const willOpen = profile.hidden;
    if (willOpen) inv.classList.remove('open');
    profile.hidden = !willOpen;
    profileButton.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
    portraitButton.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
    buttonState(profileButton, willOpen);
    buttonState(inventoryButton, false);
  }

  function toggleInventory() {
    closeProfile();
    inv.classList.toggle('open');
  }

  inventoryButton.onclick = toggleInventory;
  profileButton.onclick = toggleProfile;
  portraitButton.onclick = toggleProfile;

  new MutationObserver(() => buttonState(inventoryButton, inv.classList.contains('open')))
    .observe(inv, { attributes: true, attributeFilter: ['class'] });

  function sync() {
    if (!window.__hudData) return;
    const d = window.__hudData();
    const fraction = Math.max(0, Math.min(1, d.hpMax ? d.hp / d.hpMax : 0));
    document.getElementById('codexName').textContent = d.nome;
    document.getElementById('codexHpClip').style.width = (fraction * 260) + 'px';
    document.getElementById('codexHpValue').textContent = d.hp + '/' + d.hpMax;
    document.getElementById('codexProfileName').textContent = d.nome;
    document.getElementById('codexProfileLevel').textContent = 'Nível ' + d.nivel;
    document.getElementById('codexProfileGold').textContent = d.gold;
    document.getElementById('codexProfileAge').textContent = d.idade;
    document.getElementById('codexProfileHp').textContent = d.hp + '/' + d.hpMax;
    for (const id of ['codexPortrait', 'codexProfilePortrait']) {
      const image = document.getElementById(id);
      if (d.portrait) { image.src = d.portrait; image.hidden = false; }
      else image.hidden = true;
    }
  }
  addEventListener('hudchange', sync);
  addEventListener('keydown', event => {
    if (event.key === 'Escape') closeProfile();
  });
  sync();
})();
</script>

</body>
