<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ilha de Elmsong — 64×64 · biomas, monstros e paper doll</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
/* --- fontes pixel --- */
@font-face { font-family: 'Press Start 2P'; src: url('../vendor/fonts/PressStart2P.woff2') format('woff2'); font-display: block; }
@font-face { font-family: 'VT323'; src: url('../vendor/fonts/VT323.woff2') format('woff2'); font-display: block; }
@font-face { font-family: 'Silkscreen'; src: url('../vendor/fonts/Silkscreen.woff2') format('woff2'); font-display: block; }

/* ============ HUD React (3 temas via data-theme) ============ */
#hudReact { position: fixed; top: 64px; left: 12px; z-index: 15; image-rendering: pixelated; }
#hudReact img { image-rendering: pixelated; }
#hudReact .av img { width: 100%; height: 100%; object-fit: cover; }
#hudReact .row { display: flex; align-items: center; }

/* --- Tema 1: PERGAMINHO (madeira/pergaminho, barra contínua, sem avatar) --- */
#hudReact[data-theme="pergaminho"] .card {
  width: 232px; padding: 9px 12px;
  background:
    repeating-linear-gradient(0deg, rgba(120,80,30,.05) 0 3px, transparent 3px 6px),
    linear-gradient(145deg, #efe0bb, #d8c48c);
  border: 4px solid #7a4a1e; outline: 3px solid #2c1608;
  box-shadow: inset 0 0 0 2px #c79a52, inset 0 0 18px rgba(120,70,20,.35);
  color: #4a2c10; font-family: 'VT323', monospace;
}
#hudReact[data-theme="pergaminho"] .nome { font-size: 22px; line-height: 1.1; color: #5a2f10; }
#hudReact[data-theme="pergaminho"] .hpTrack {
  height: 15px; margin: 7px 0; position: relative;
  background: #6a4a22; border: 2px solid #3a2208; box-shadow: inset 1px 1px 0 #2c1808;
}
#hudReact[data-theme="pergaminho"] .hpFill { height: 100%; background: #c0392b; transition: width .2s; }
#hudReact[data-theme="pergaminho"] .hpFill.mid { background: #d98a1e; }
#hudReact[data-theme="pergaminho"] .hpNum {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: #fff; text-shadow: 1px 1px 0 #000;
}
#hudReact[data-theme="pergaminho"] .stats { display: flex; gap: 18px; }
#hudReact[data-theme="pergaminho"] .stat { font-size: 19px; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
#hudReact[data-theme="pergaminho"] .stat img { width: 18px; height: 18px; }

/* --- Tema 2: CRISTAL (limpo, barra segmentada) --- */
#hudReact[data-theme="cristal"] .card {
  width: 256px; padding: 11px 13px;
  background: linear-gradient(160deg, rgba(20,26,38,.96), rgba(12,16,24,.96));
  border: 2px solid #2de1c2; outline: 2px solid #05161a;
  box-shadow: 0 0 14px rgba(45,225,194,.25), inset 0 0 0 1px rgba(45,225,194,.12);
  color: #dff6f2; font-family: 'VT323', monospace;
}
#hudReact[data-theme="cristal"] .av {
  width: 44px; height: 44px; margin-right: 10px; flex: none;
  border: 2px solid #2de1c2; background: #0e2a30; box-shadow: 0 0 6px rgba(45,225,194,.4);
}
#hudReact[data-theme="cristal"] .nome { font-family: 'Silkscreen', monospace; font-size: 12px; color: #eafffb; letter-spacing: .5px; }
#hudReact[data-theme="cristal"] .sub { font-size: 15px; color: #6fd8c8; }
#hudReact[data-theme="cristal"] .hpTrack {
  height: 14px; margin: 9px 0 7px; position: relative;
  background: #0b1a1e; border: 1px solid #103038; box-shadow: inset 0 0 4px #000;
}
#hudReact[data-theme="cristal"] .hpFill {
  height: 100%; background: linear-gradient(180deg, #5cf0a0, #22c55e);
  box-shadow: 0 0 6px rgba(92,240,160,.5); transition: width .2s;
}
#hudReact[data-theme="cristal"] .hpFill.mid { background: linear-gradient(180deg, #ffe066, #f59e0b); }
#hudReact[data-theme="cristal"] .hpFill.low { background: linear-gradient(180deg, #ff9a9a, #ef4444); }
#hudReact[data-theme="cristal"] .hpn {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #eafffb; text-shadow: 1px 1px 0 #000;
}
#hudReact[data-theme="cristal"] .stats {
  display: flex; align-items: center; gap: 16px;
  background: rgba(45,225,194,.06); border: 1px solid rgba(45,225,194,.2); padding: 5px 10px;
}
#hudReact[data-theme="cristal"] .stat { display: flex; align-items: center; gap: 6px; font-size: 18px; color: #ffe6a8; white-space: nowrap; }
#hudReact[data-theme="cristal"] .stat.age { color: #bfe3ff; }
#hudReact[data-theme="cristal"] .stat img { width: 16px; height: 16px; }
/* --- seletor de HUD --- */
#hudSwitch {
  position: fixed; top: 218px; left: 12px; z-index: 15;
  display: flex; gap: 4px; background: rgba(10,12,18,.7);
  border: 1px solid rgba(255,255,255,.18); border-radius: 12px; padding: 3px;
}
#hudSwitch button {
  border: 0; background: transparent; color: #cfd6e4; cursor: pointer;
  font-size: 11.5px; padding: 5px 10px; border-radius: 9px; font-family: inherit;
}
#hudSwitch button.on { background: #ffd76a; color: #3a2408; font-weight: 700; }
#invToggle {
  position: fixed; top: 54px; right: 12px; z-index: 20;
  background: rgba(20,24,32,.85); color: #ffd76a;
  border: 1px solid rgba(255,255,255,.25); border-radius: 20px;
  padding: 8px 14px; font-size: 14px; cursor: pointer;
}
#inv {
  position: fixed; top: 100px; right: 12px; z-index: 20; width: 300px;
  background: rgba(16,19,26,.93); border: 1px solid rgba(255,255,255,.2);
  border-radius: 14px; padding: 14px; display: none;
  max-height: calc(100vh - 120px); overflow-y: auto;
}
#inv.open { display: block; }
#inv h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em;
  color: #9fb3d0; margin: 10px 0 8px; }
#inv h3:first-child { margin-top: 0; }
.slots { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.slot {
  background: #232936; border: 2px solid #333c4e; border-radius: 10px;
  padding: 4px 2px 5px; cursor: pointer; text-align: center;
}
.slot:hover { border-color: #5a6b8c; }
.slot.sel { border-color: #ffd76a; background: #2e3242; }
.slot img { width: 40px; height: 40px; image-rendering: pixelated; margin-bottom: 2px; }
.slot span { display: block; font-size: 9.5px; color: #cfd6e4; }
@media (max-width: 640px) {
  #inv { width: 260px; }
  .slot img { width: 32px; height: 32px; }
}
</style>
</head>
<body>
<div class="hud">
  <a href="../">← Hub</a>
  <span class="chip"><b>64×64</b> · 4 biomas · 18 monstros · paper doll · montarias · bioma NEVE por IA</span>
  <span class="hint">WASD/setas · ataque automático ao aproximar · I abre inventário</span>
</div>
<button id="invToggle">🎒 Inventário</button>
<div id="inv">
  <h3>Personagem</h3>
  <div class="slots" id="slotsS"></div>
  <h3>Armas</h3>
  <div class="slots" id="slotsW"></div>
  <h3>Armaduras</h3>
  <div class="slots" id="slotsA"></div>
  <h3>Montarias</h3>
  <div class="slots" id="slotsM"></div>
</div>
<div id="hudReact"></div>
<div id="hudSwitch">
  <button data-h="pergaminho">Pergaminho</button>
  <button data-h="cristal">Cristal</button>
</div>
<div id="game"></div>
<script src="../vendor/react.production.min.js"></script>
<script src="../vendor/react-dom.production.min.js"></script>
<script>
// HUD em React puro (sem build): 3 temas, escuta 'hudchange' do jogo
(function () {
  const e = React.createElement;
  const AV = '../assets/64/ui/icons/skin_lpc.png';
  const PX = '../assets/64/ui/px/';
  const img = (src, cls) => e('img', { src: PX + src, className: cls, alt: '' });
  const avatar = (cls) => e('div', { className: cls }, e('img', { src: AV, alt: '' }));

  const hpLvl = (f) => (f <= 0.25 ? ' low' : f <= 0.5 ? ' mid' : '');
  function Pergaminho(d) {
    const f = d.hp / d.hpMax;
    return e('div', { className: 'card' },
      e('div', { className: 'nome' }, d.nome),
      e('div', { className: 'hpTrack' },
        e('div', { className: 'hpFill' + hpLvl(f), style: { width: (f * 100) + '%' } }),
        e('div', { className: 'hpNum' }, d.hp + ' / ' + d.hpMax)),
      e('div', { className: 'stats' },
        e('div', { className: 'stat' }, img('coin.png'), d.gold),
        e('div', { className: 'stat' }, img('gem.png'), 'Idade ' + d.idade)));
  }
  function Cristal(d) {
    const f = d.hp / d.hpMax;
    return e('div', { className: 'card' },
      e('div', null,
        e('div', { className: 'nome' }, d.nome.toUpperCase()),
        e('div', { className: 'sub' }, 'Elmsong')),
      e('div', { className: 'hpTrack' },
        e('div', { className: 'hpFill' + hpLvl(f), style: { width: (f * 100) + '%' } }),
        e('div', { className: 'hpn' }, 'HP ' + d.hp + ' / ' + d.hpMax)),
      e('div', { className: 'stats' },
        e('div', { className: 'stat' }, img('coin.png'), d.gold),
        e('div', { className: 'stat age' }, img('gem.png'), 'Idade ' + d.idade)));
  }
  const THEMES = { pergaminho: Pergaminho, cristal: Cristal };

  function Hud() {
    const [d, setD] = React.useState({ nome: 'Calney', hp: 100, hpMax: 100, gold: 125, idade: 10 });
    const [theme, setTheme] = React.useState('pergaminho');
    React.useEffect(() => {
      const sync = () => {
        if (window.__hudData) setD(window.__hudData());
        if (window.__hudTheme) setTheme(window.__hudTheme);
      };
      window.addEventListener('hudchange', sync);
      sync();
      return () => window.removeEventListener('hudchange', sync);
    }, []);
    const root = document.getElementById('hudReact');
    if (root) root.dataset.theme = theme;
    return (THEMES[theme] || Pergaminho)(d);
  }
  ReactDOM.createRoot(document.getElementById('hudReact')).render(e(Hud));
})();
// seletor de HUD
window.__markHud = (name) => {
  document.querySelectorAll('#hudSwitch button').forEach(b =>
    b.classList.toggle('on', b.dataset.h === name));
};
document.querySelectorAll('#hudSwitch button').forEach(b =>
  b.onclick = () => window.__setHud && window.__setHud(b.dataset.h));
</script>
<script src="../vendor/phaser.min.js"></script>
<script src="../shared/engine.js?v=hud2b"></script>
<script>
// inventário DOM — conversa com o jogo via window.__equip
const WEAPONS_UI = [
  ['longsword', 'Espada longa'], ['dagger', 'Adaga'], ['mace', 'Maça'],
  ['waraxe', 'Machado'], ['spear', 'Lança'],
];
const ARMORS_UI = [
  ['shirt', 'Camisa'], ['leather', 'Couro'], ['chain', 'Cota de malha'],
  ['legion', 'Legião'], ['plate', 'Placas'],
];
const MOUNTS_UI = [
  ['none', 'A pé', 'dismount'],
  ['marrom', 'Marrom', 'horse_marrom'], ['preto', 'Preto', 'horse_preto'],
  ['cinza', 'Cinza', 'horse_cinza'], ['dourado', 'Dourado', 'horse_dourado'],
  ['branco', 'Branco', 'horse_branco'], ['porco', 'Porco Rosa ✦', 'mount_porco'],
];
function buildSlots(elId, items, kind) {
  const el = document.getElementById(elId);
  for (const [id, label, icon] of items) {
    const b = document.createElement('div');
    b.className = 'slot';
    b.dataset.id = id;
    b.innerHTML = `<img src="../assets/64/ui/icons/${icon || id}.png" alt=""><span>${label}</span>`;
    b.onclick = () => {
      window.__equip && window.__equip(kind, id);
      el.querySelectorAll('.slot').forEach(s => s.classList.toggle('sel', s === b));
    };
    el.appendChild(b);
  }
}
buildSlots('slotsS', [['skin_lpc', 'Herói LPC'], ['skin_ai', 'Cavaleiro IA ✦']], 'skin');
buildSlots('slotsW', WEAPONS_UI, 'weapon');
buildSlots('slotsA', ARMORS_UI, 'armor');
buildSlots('slotsM', MOUNTS_UI, 'mount');
document.getElementById('invToggle').onclick = () =>
  document.getElementById('inv').classList.toggle('open');
window.__markEquipped = (kind, id) => {
  const el = document.getElementById(
    kind === 'weapon' ? 'slotsW' : kind === 'skin' ? 'slotsS' : kind === 'mount' ? 'slotsM' : 'slotsA');
  el.querySelectorAll('.slot').forEach(s => s.classList.toggle('sel', s.dataset.id === id));
};
addEventListener('keydown', e => {
  if (e.key === 'i' || e.key === 'I') document.getElementById('inv').classList.toggle('open');
});
</script>
<script src="game.js?v=hud2b"></script>
</body>
</html>
